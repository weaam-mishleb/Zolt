name: ETL → Cloud DB

# Loads the full catalog into the cloud DB from GitHub's fast US runners, so a
# slow/distant local link is no longer the bottleneck.
#
# Data source: the price files are mirrored as GZIPPED assets on a GitHub Release
# of THIS repo, so NO Kaggle account/key is needed — they're pulled with the
# built-in GITHUB_TOKEN. The tiny store CSVs are committed in db/seed_stores/.
# One-time setup: create a release (default tag "dataset-v1") and upload the 3
# files archive/price_full_file_*.csv.gz (see DEPLOYMENT.md).
on:
  workflow_dispatch:
    inputs:
      data_tag:
        description: "Release tag holding the *.csv.gz price files"
        default: "dataset-v1"

permissions:
  contents: read

concurrency:
  group: etl
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DATA_TAG: ${{ inputs.data_tag || 'dataset-v1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Stage dataset (committed stores + price files from the release)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p archive
          cp db/seed_stores/*.csv archive/
          gh release download "$DATA_TAG" --repo "$GITHUB_REPOSITORY" -p '*.csv.gz' -D archive
          gunzip -f archive/*.gz
          ls -lh archive

      - name: Initialize schema (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scripts.init_db

      - name: Run full ETL → cloud DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m etl.run --full --batch-size 1000   # fast low-latency link → larger batches
