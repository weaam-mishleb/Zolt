# ───────────── Zolt — MySQL 8.0 ─────────────
# Spin up:  docker compose up -d
# The schema in ./db/init is executed automatically on first boot
# (only when the data volume is empty).

services:
  db:
    image: mysql:8.0
    container_name: zolt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-zolt_root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zolt}
      MYSQL_USER: ${MYSQL_USER:-zolt}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zolt_pass}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      # FULLTEXT tuning for short Hebrew tokens (min token length 2)
      - --innodb-ft-min-token-size=2
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - zolt_db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-zolt_root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  zolt_db_data:
    name: zolt_db_data
